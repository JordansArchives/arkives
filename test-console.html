<!DOCTYPE html>
<html>
<head>
    <title>Console Test</title>
    <style>
        body { font-family: monospace; padding: 20px; }
        #output { background: #000; color: #0f0; padding: 20px; white-space: pre-wrap; }
        .error { color: #f00; }
        .info { color: #0ff; }
    </style>
</head>
<body>
    <h1>jsPDF Console Test</h1>
    <div id="output"></div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
    <script>
        const output = document.getElementById('output');
        
        function log(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = type;
            div.textContent = msg;
            output.appendChild(div);
        }
        
        // Capture console errors
        const originalError = console.error;
        console.error = function(...args) {
            log('ERROR: ' + args.join(' '), 'error');
            originalError.apply(console, args);
        };
        
        // Test immediately
        log('=== jsPDF Library Test ===');
        log('typeof window.jspdf: ' + typeof window.jspdf);
        
        if (typeof window.jspdf === 'undefined') {
            log('ERROR: window.jspdf is undefined - library did not load!', 'error');
        } else {
            log('✓ window.jspdf exists');
            log('window.jspdf properties: ' + Object.keys(window.jspdf).join(', '));
            
            if (window.jspdf.jsPDF) {
                log('✓ window.jspdf.jsPDF exists');
                log('typeof window.jspdf.jsPDF: ' + typeof window.jspdf.jsPDF);
                
                // Try to create a PDF
                try {
                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF();
                    log('✓ Successfully created jsPDF instance');
                    doc.text('Test PDF', 10, 10);
                    log('✓ Successfully added text to PDF');
                } catch (e) {
                    log('ERROR creating PDF: ' + e.message, 'error');
                    log('Stack: ' + e.stack, 'error');
                }
            } else {
                log('ERROR: window.jspdf.jsPDF does not exist!', 'error');
            }
        }
        
        log('\n=== Script Load Test ===');
        const scripts = document.getElementsByTagName('script');
        for (let script of scripts) {
            if (script.src.includes('jspdf')) {
                log('jsPDF script tag found: ' + script.src);
                script.addEventListener('load', () => log('✓ jsPDF script loaded successfully'));
                script.addEventListener('error', () => log('ERROR: jsPDF script failed to load', 'error'));
            }
        }
    </script>
</body>
</html>
